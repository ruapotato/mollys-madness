<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mollys Madness</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 2rem 1rem; background: #faf7f2; color: #2a2320; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  header { text-align: center; margin-bottom: 2rem; }
  header img { max-width: 280px; width: 100%; height: auto; border-radius: 8px; }
  h1 { margin: 1rem 0 0.25rem; font-size: 2.25rem; font-weight: 600; letter-spacing: -0.02em; }
  p.tagline { margin: 0; color: #6b5f57; font-style: italic; }
  .gallery { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); max-width: 900px; width: 100%; }
  .gallery figure { margin: 0; background: #fff; padding: 0.75rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .gallery img { width: 100%; height: auto; display: block; border-radius: 4px; }
  footer { margin-top: 3rem; font-size: 0.85rem; color: #8a7c73; text-align: center; }
  @media (prefers-color-scheme: dark) { body { background: #1a1613; color: #e8dfd6; } p.tagline { color: #b8a89c; } .gallery figure { background: #2a221d; box-shadow: 0 2px 6px rgba(0,0,0,0.4); } }
</style>
</head>
<body>
  <header>
    <img src="images/logo.webp" alt="Mollys Madness logo">
    <h1>Mollys Madness</h1>
    <p class="tagline">Handmade crafts and art</p>
  </header>
  <section class="gallery">
    <figure>
      <img src="images/piece-1.webp" alt="Recent piece by Molly">
    </figure>
  </section>
  <footer>More soon.</footer>
</body>
</html>
